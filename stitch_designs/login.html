<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Contrata AI - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FF8855", 
                        "action": "#2ECC71", 
                        "background-light": "#F8F9FD",
                        "background-dark": "#221610",
                        "surface": "#FFFFFF",
                        "slate-800": "#1E293B",
                        "slate-500": "#64748B",
                        "slate-200": "#E2E8F0",
                        "input-bg": "#F1F5F9",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "2xl": "1.75rem",
                        "3xl": "2rem",
                        "full": "9999px"
                    },
                    backgroundImage: {
                        'gradient-primary': 'linear-gradient(135deg, #FF9F43 0%, #FF6B6B 100%)',
                    }
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark text-slate-800 h-screen w-full flex flex-col items-center justify-center relative overflow-hidden">
<div class="fixed top-0 right-0 -z-10 w-96 h-96 bg-primary/5 rounded-full blur-3xl translate-x-1/2 -translate-y-1/2"></div>
<div class="fixed bottom-0 left-0 -z-10 w-64 h-64 bg-action/5 rounded-full blur-3xl -translate-x-1/2 translate-y-1/2"></div>
<div class="w-full flex flex-col justify-center px-6 py-8 max-w-[500px] m-auto h-full">
<header class="w-full text-center sm:text-left mb-8">
<div class="mb-8 flex justify-center sm:justify-start">
<div class="h-20 w-20 rounded-2xl bg-gradient-primary flex items-center justify-center shadow-lg shadow-orange-200/50">
<span class="material-symbols-outlined text-white text-5xl">handyman</span>
</div>
</div>
<h1 class="text-[32px] leading-tight font-bold tracking-tight text-slate-800 mb-3">Bem-vindo de volta!</h1>
<p class="text-slate-500 text-[18px]">Insira seus dados para acessar.</p>
</header>
<main class="w-full flex flex-col gap-6">
<form class="flex flex-col gap-5 w-full">
<div class="group w-full">
<label class="block text-[16px] font-semibold text-slate-500 mb-2 ml-1" for="email">Email</label>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">mail</span>
</div>
<input class="w-full h-[60px] pl-14 pr-4 bg-input-bg rounded-xl border-none focus:ring-2 focus:ring-primary/50 text-slate-800 placeholder-slate-400 text-[16px] font-medium transition-all" id="email" placeholder="seu@email.com" type="email"/>
</div>
</div>
<div class="group w-full">
<label class="block text-[16px] font-semibold text-slate-500 mb-2 ml-1" for="password">Senha</label>
<div class="relative w-full">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-slate-400 group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[28px]">lock</span>
</div>
<input class="w-full h-[60px] pl-14 pr-14 bg-input-bg rounded-xl border-none focus:ring-2 focus:ring-primary/50 text-slate-800 placeholder-slate-400 text-[16px] font-medium transition-all" id="password" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-0 pr-4 flex items-center text-slate-400 hover:text-slate-600 focus:outline-none" type="button">
<span class="material-symbols-outlined text-[28px]">visibility_off</span>
</button>
</div>
<div class="flex justify-end mt-3">
<a class="text-[16px] font-semibold text-primary hover:text-orange-700 transition-colors" href="#">Esqueceu a senha?</a>
</div>
</div>
<button class="w-full h-[60px] bg-gradient-primary text-white font-bold text-xl rounded-2xl shadow-lg shadow-orange-300/50 active:scale-[0.98] transition-all flex items-center justify-center gap-3 mt-2" type="button">
                    Entrar
                    <span class="material-symbols-outlined text-[28px]">arrow_forward</span>
</button>
</form>
<div class="relative flex py-2 items-center w-full">
<div class="flex-grow border-t border-slate-200"></div>
<span class="flex-shrink-0 mx-4 text-slate-400 text-[16px] font-medium">Ou continue com</span>
<div class="flex-grow border-t border-slate-200"></div>
</div>
<div class="flex flex-col gap-4 w-full">
<button class="w-full flex items-center justify-center h-[56px] rounded-xl border border-slate-200 bg-surface hover:bg-slate-50 active:scale-[0.98] transition-all gap-3">
<img alt="Google Logo" class="w-7 h-7" data-alt="Google G logo" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD6KJ87-uhb9yLeLo9SVBtSmobgIT0DZ_7qmRSA6j5tllZTXOz0Z0NYcIL-ZdnQnju91NiMhoeTm6lt_z1bphfi37rPzEOykDtKoSUOQc9L0QKRADQEfd8X_YryIqtMWUJeDgqleEEk-w7wYy-xvGMSeGE94q_BAQpdayCOPnYa9_XXhdx-kqu-p_3g9-1vcPiU9WWbWYb4gc_cogIsE3k-ZiLHAQaGxHWbCZLyL6T7BY50jOb8CEAenx3sWdVBUg_KFUxS7hpl6BJX"/>
<span class="font-semibold text-[18px] text-slate-800">Google</span>
</button>
<button class="w-full flex items-center justify-center h-[56px] rounded-xl border border-slate-200 bg-surface hover:bg-slate-50 active:scale-[0.98] transition-all gap-3">
<span class="material-symbols-outlined text-3xl text-black">ios</span> 
<span class="font-semibold text-[18px] text-slate-800">Apple</span>
</button>
</div>
</main>
<footer class="w-full text-center mt-8">
<p class="text-slate-500 font-medium text-[16px]">
                Não tem uma conta? 
                <a class="text-primary font-bold hover:underline ml-1" href="#">Cadastre-se</a>
</p>
</footer>
</div>

</body></html>
